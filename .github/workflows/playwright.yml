name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env: #define your environment variables
      BASE_URL: ${{vars.BASE_URL}}
      STANDARD_USER: ${{secrets.STANDARD_USER}}
      STANDARD_PASSWORD: ${{secrets.STANDARD_PASSWORD}}
      PROBLEM_USER: ${{secrets.PROBLEM_USER}}
      PROBLEM_PASSWORD: ${{secrets.PROBLEM_PASSWORD}}
      PERFORMANCE_GLITCH_USER: ${{secrets.PERFORMANCE_GLITCH_USER}}
      PERFORMANCE_GLITCH_PASSWORD: ${{secrets.PERFORMANCE_GLITCH_PASSWORD}}
      ERROR_USER: ${{secrets.ERROR_USER}}
      ERROR_PASSWORD: ${{secrets.ERROR_PASSWORD}}
      VISUAL_USER: ${{secrets.VISUAL_USER}}
      VISUAL_PASSWORD: ${{secrets.VISUAL_PASSWORD}}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v6
      with:
       github_token: ${{ secrets.CF_GITHUB_TOKEN }}
       publish_dir: ./playwright-report
       publish_branch: gh-p
